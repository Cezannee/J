<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessica Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particle-container"></div>

    <main class="book-page">
        <section id="gallery" class="section-gallery page-section">
            <div class="container">
                <div class="section-title">
                    <h2>Jessica Gallery</h2>
                    <p>Not the best photo, but it has the best memories.</p>
                </div>

                <div class="gallery-grid">
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-cafe">
                            <img src="images/1.jpg" alt="Jessy candid smiling at a cafe">
                            <p class="dimensions-tag photo-tag">Jessy Candid</p>
                        </div>
                        <div class="card-caption">My Favorite Smile</div>
                    </div>
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-cosplay">
                            <img src="images/2.jpg" alt="Jessy smiling in cosplay outfit">
                            <p class="dimensions-tag photo-tag">Cosplay Glow</p>
                        </div>
                        <div class="card-caption">Her Brightest Smile</div>
                    </div>
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-flower">
                            <img src="images/3.jpg" alt="Jessy holding flowers outdoors">
                            <p class="dimensions-tag photo-tag">Flower Day</p>
                        </div>
                        <div class="card-caption">Proud of You</div>
                    </div>
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-selfie">
                            <img src="images/4.jpg" alt="Jessy taking a soft selfie in the car">
                            <p class="dimensions-tag photo-tag">Soft Selfie</p>
                        </div>
                        <div class="card-caption">Little Everyday Magic</div>
                    </div>
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-closeup">
                            <img src="images/5.jpg" alt="Jessy close-up portrait with glasses">
                            <p class="dimensions-tag photo-tag">Pretty Close-up</p>
                        </div>
                        <div class="card-caption">Effortlessly Beautiful</div>
                    </div>
                    <div class="gallery-card">
                        <div class="photo-placeholder has-photo photo-focus-horse">
                            <img src="images/6.jpg" alt="Jessy sitting beside a small horse">
                            <p class="dimensions-tag photo-tag">Horse Moment</p>
                        </div>
                        <div class="card-caption">Her Gentle Brave Heart</div>
                    </div>
                </div>
            </div>
            <div class="floating-page-control page-control-prev">
                <button class="page-nav page-prev" type="button" data-prev="journey.html" aria-label="Go back to our story">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M19 12H5M11 6l-6 6 6 6" />
                    </svg>
                </button>
            </div>
            <div class="floating-page-control page-control-next">
                <button class="page-next" type="button" data-next="surprise.html" aria-label="Go to secret message">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h14M13 6l6 6-6 6" />
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
