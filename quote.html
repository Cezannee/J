<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote for Jessica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particle-container"></div>

    <main class="book-page">
        <section class="section-quote page-section" aria-label="Quote for an independent woman">
            <div class="quote-container">
                <p class="quote-mark">&ldquo;</p>
                <blockquote>
                    I am no bird; and no net ensnares me: I am a free human being with an independent will.
                </blockquote>
                <p class="quote-note"></p>
            </div>
            <button class="page-nav page-prev" type="button" data-prev="countdown.html" aria-label="Go back to countdown">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5M11 6l-6 6 6 6" />
                </svg>
            </button>
            <button class="page-next" type="button" data-next="home.html" aria-label="Go to home">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14M13 6l6 6-6 6" />
                </svg>
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
